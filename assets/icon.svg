<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Microphone body -->
  <rect x="212" y="100" width="88" height="180" rx="44" fill="#fff"/>
  <!-- Microphone arc -->
  <path d="M160 260 a96 96 0 0 0 192 0" stroke="#fff" stroke-width="28" stroke-linecap="round" fill="none"/>
  <!-- Microphone stand -->
  <line x1="256" y1="356" x2="256" y2="400" stroke="#fff" stroke-width="28" stroke-linecap="round"/>
  <!-- Sound waves (left) -->
  <path d="M120 180 a60 80 0 0 0 0 120" stroke="#c4b5fd" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M84 156 a90 120 0 0 0 0 168" stroke="#c4b5fd" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.45"/>
  <!-- Sound waves (right) -->
  <path d="M392 180 a60 80 0 0 1 0 120" stroke="#c4b5fd" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M428 156 a90 120 0 0 1 0 168" stroke="#c4b5fd" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.45"/>
</svg>
